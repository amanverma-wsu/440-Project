<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', system-ui, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            text-align: center;
            max-width: 650px;
            width: 100%;
            padding: 30px 20px;
        }

        /* Section headers */
        .section-title {
            font-family: 'Bungee', cursive;
            font-size: 2.2rem;
            color: #f0932b;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
        }

        .section-divider {
            height: 3px;
            background: linear-gradient(90deg, transparent, #5b9bd5, transparent);
            margin: 8px 0 20px;
        }

        /* Grid selection cards */
        .grid-options {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .grid-card {
            width: 160px;
            padding: 15px;
            border-radius: 16px;
            background: #999;
            cursor: pointer;
            transition: all 0.2s;
            border: 4px solid transparent;
        }

        .grid-card:hover { transform: translateY(-3px); }

        .grid-card.active {
            background: #5b9bd5;
            border-color: #3a7cc3;
        }

        .grid-card-label {
            font-family: 'Bungee', cursive;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .grid-preview {
            display: inline-grid;
            gap: 3px;
            padding: 8px;
            background: rgba(0,0,0,0.15);
            border-radius: 10px;
        }

        .grid-preview .mini-cell {
            width: 18px;
            height: 18px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        .grid-card.size-4 .mini-cell { width: 14px; height: 14px; }
        .grid-card.size-5 .mini-cell { width: 11px; height: 11px; }

        /* Mode selection */
        .mode-options {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .mode-btn {
            padding: 14px 45px;
            border-radius: 30px;
            border: none;
            font-family: 'Bungee', cursive;
            font-size: 1.2rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            background: #999;
        }

        .mode-btn:hover { transform: translateY(-2px); }
        .mode-btn.active { background: #5b9bd5; }

        /* Algorithm selection (shown in CPU mode) */
        .algo-section {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .algo-options {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .algo-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 3px solid #ddd;
            background: #fff;
            color: #666;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .algo-btn:hover { border-color: #5b9bd5; color: #5b9bd5; }
        .algo-btn.active { border-color: #5b9bd5; background: #5b9bd5; color: #fff; }

        /* Score display */
        .score-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 20px;
            color: #5b9bd5;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .star { font-size: 1.4rem; }

        /* Play button */
        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: #5b9bd5;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(91,155,213,0.4);
            margin-top: 10px;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(91,155,213,0.5);
        }

        .play-btn svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        /* Game board */
        .game { display: none; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 12px 20px;
            background: #5b9bd5;
            border-radius: 30px;
            color: #fff;
        }

        .status-text {
            font-family: 'Bungee', cursive;
            font-size: 1rem;
        }

        .stats-text {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .board {
            display: inline-grid;
            gap: 6px;
            padding: 15px;
            background: #e8e8e8;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .cell {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background: #fff;
            border: 3px solid #ddd;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bungee', cursive;
            font-size: 2.5rem;
            transition: all 0.15s;
            user-select: none;
        }

        .cell:hover:not(.taken):not(.game-over) {
            background: #eef5fc;
            border-color: #5b9bd5;
            transform: scale(1.05);
        }

        .cell.x { color: #f0932b; }
        .cell.o { color: #5b9bd5; }

        .cell.win {
            animation: pulse 0.6s ease infinite alternate;
            border-color: #f0932b;
            background: #fef3e2;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        .cell.taken { cursor: default; }
        .cell.game-over { cursor: default; }

        .game-result {
            font-family: 'Bungee', cursive;
            font-size: 1.8rem;
            margin-bottom: 15px;
            min-height: 45px;
        }

        .game-result.win { color: #27ae60; }
        .game-result.lose { color: #e74c3c; }
        .game-result.draw { color: #f0932b; }

        .game-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-back {
            padding: 12px 30px;
            border: 3px solid #ddd;
            border-radius: 30px;
            background: #fff;
            color: #666;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover { border-color: #5b9bd5; color: #5b9bd5; }

        .btn-restart {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: #5b9bd5;
            color: #fff;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .btn-restart:hover { transform: translateY(-2px); }

        /* Board size adjustments */
        .board.size-4 .cell { width: 85px; height: 85px; font-size: 2rem; }
        .board.size-5 .cell { width: 72px; height: 72px; font-size: 1.6rem; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Menu -->
        <div id="menu">
            <div class="section-title">Choose a Grid</div>
            <div class="section-divider"></div>

            <div class="grid-options">
                <div class="grid-card active" data-size="3" onclick="selectSize(this, 3)">
                    <div class="grid-card-label">3X3</div>
                    <div class="grid-preview" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                    </div>
                </div>
                <div class="grid-card size-4" data-size="4" onclick="selectSize(this, 4)">
                    <div class="grid-card-label">4X4</div>
                    <div class="grid-preview" style="grid-template-columns: repeat(4, 1fr);">
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                    </div>
                </div>
                <div class="grid-card size-5" data-size="5" onclick="selectSize(this, 5)">
                    <div class="grid-card-label">5X5</div>
                    <div class="grid-preview" style="grid-template-columns: repeat(5, 1fr);">
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                        <div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div><div class="mini-cell"></div>
                    </div>
                </div>
            </div>

            <div class="section-title">Mode</div>
            <div class="section-divider"></div>

            <div class="mode-options">
                <button class="mode-btn active" onclick="selectMode(this, 'cpu')">CPU</button>
                <button class="mode-btn" onclick="selectMode(this, '2p')">2 Players</button>
            </div>

            <div class="algo-section" id="algoSection">
                <div class="algo-options">
                    <button class="algo-btn active" data-algo="alphabeta" onclick="selectAlgo(this, 'alphabeta')">Alpha-Beta</button>
                    <button class="algo-btn" data-algo="minimax" onclick="selectAlgo(this, 'minimax')">Minimax</button>
                    <button class="algo-btn" data-algo="nn" onclick="selectAlgo(this, 'Neural Net')">Neural Net</button>
                </div>
            </div>

            <div class="score-display">
                <span class="star">&#9733;</span>
                <span id="scoreCount">0</span>
            </div>

            <button class="play-btn" onclick="startGame()">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>

        <!-- Game -->
        <div class="game" id="game">
            <div class="status-bar">
                <span class="status-text" id="status">Your turn</span>
                <span class="stats-text" id="stats"></span>
            </div>
            <div class="board" id="board"></div>
            <div class="game-result" id="result"></div>
            <div class="game-buttons">
                <button class="btn-back" id="menuBtn" onclick="showMenu()">Menu</button>
                <button class="btn-restart" id="restartBtn" onclick="startGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        let config = { size: 3, algorithm: 'alphabeta', human: 'X', mode: 'cpu' };
        let gameOver = false;
        let winningLine = null;
        let score = 0;
        let currentPlayer = 'X';

        function selectSize(el, size) {
            document.querySelectorAll('.grid-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            config.size = size;
        }

        function selectMode(el, mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            config.mode = mode;
            document.getElementById('algoSection').style.display = mode === 'cpu' ? 'block' : 'none';
        }

        function selectAlgo(el, algo) {
            document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            config.algorithm = algo;
        }

        function showMenu() {
            document.getElementById('menu').style.display = 'block';
            document.getElementById('game').style.display = 'none';
        }

        async function startGame() {
            gameOver = false;
            winningLine = null;
            currentPlayer = 'X';
            document.getElementById('result').textContent = '';
            document.getElementById('result').className = 'game-result';
            document.getElementById('stats').textContent = '';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'block';

            if (config.mode === '2p') {
                document.getElementById('status').textContent = "X's turn";
                document.getElementById('stats').textContent = '2 Player Mode';
                render2PBoard();
                return;
            }

            document.getElementById('status').textContent = 'Starting...';
            const res = await fetch('/api/new', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            const data = await res.json();
            renderBoard(data);

            if (data.stats) {
                document.getElementById('stats').textContent =
                    `AI: ${data.stats.nodes} nodes, ${data.stats.time}s`;
            }
            document.getElementById('status').textContent = 'Your turn';
        }

        /* 2-player local mode */
        let localGrid = [];

        function render2PBoard() {
            const n = config.size;
            localGrid = Array.from({length: n}, () => Array(n).fill('.'));
            currentPlayer = 'X';
            drawLocalBoard();
        }

        function drawLocalBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.className = `board size-${config.size}`;
            board.style.gridTemplateColumns = `repeat(${config.size}, 1fr)`;
            const n = config.size;

            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = localGrid[r][c];
                    if (val === 'X') { cell.textContent = 'X'; cell.classList.add('x', 'taken'); }
                    else if (val === 'O') { cell.textContent = 'O'; cell.classList.add('o', 'taken'); }
                    if (gameOver) cell.classList.add('game-over');
                    if (winningLine) {
                        for (const [wr, wc] of winningLine) {
                            if (wr === r && wc === c) cell.classList.add('win');
                        }
                    }
                    cell.addEventListener('click', () => localMove(r, c));
                    board.appendChild(cell);
                }
            }
        }

        function localMove(r, c) {
            if (gameOver || localGrid[r][c] !== '.') return;
            localGrid[r][c] = currentPlayer;

            const win = checkLocalWin(currentPlayer);
            const full = localGrid.flat().every(v => v !== '.');

            if (win) {
                gameOver = true;
                winningLine = win;
                document.getElementById('result').textContent = `${currentPlayer} wins!`;
                document.getElementById('result').className = 'game-result win';
                document.getElementById('status').textContent = 'Game over';
            } else if (full) {
                gameOver = true;
                document.getElementById('result').textContent = "It's a draw!";
                document.getElementById('result').className = 'game-result draw';
                document.getElementById('status').textContent = 'Game over';
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                document.getElementById('status').textContent = `${currentPlayer}'s turn`;
            }
            drawLocalBoard();
        }

        function checkLocalWin(sym) {
            const n = config.size;
            for (let r = 0; r < n; r++) {
                if (localGrid[r].every(v => v === sym)) return localGrid[r].map((_, c) => [r, c]);
            }
            for (let c = 0; c < n; c++) {
                if (Array.from({length: n}, (_, r) => localGrid[r][c]).every(v => v === sym))
                    return Array.from({length: n}, (_, r) => [r, c]);
            }
            if (Array.from({length: n}, (_, i) => localGrid[i][i]).every(v => v === sym))
                return Array.from({length: n}, (_, i) => [i, i]);
            if (Array.from({length: n}, (_, i) => localGrid[i][n-1-i]).every(v => v === sym))
                return Array.from({length: n}, (_, i) => [i, n-1-i]);
            return null;
        }

        /* CPU mode rendering */
        function renderBoard(data) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.className = `board size-${data.size}`;
            board.style.gridTemplateColumns = `repeat(${data.size}, 1fr)`;

            for (let r = 0; r < data.size; r++) {
                for (let c = 0; c < data.size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = data.grid[r][c];
                    if (val === 'X') { cell.textContent = 'X'; cell.classList.add('x', 'taken'); }
                    else if (val === 'O') { cell.textContent = 'O'; cell.classList.add('o', 'taken'); }
                    if (gameOver) cell.classList.add('game-over');
                    if (winningLine) {
                        for (const [wr, wc] of winningLine) {
                            if (wr === r && wc === c) cell.classList.add('win');
                        }
                    }
                    cell.addEventListener('click', () => makeMove(r, c));
                    board.appendChild(cell);
                }
            }
        }

        async function makeMove(row, col) {
            if (gameOver) return;
            const cell = document.querySelector(`.board .cell:nth-child(${row * config.size + col + 1})`);
            if (cell && cell.classList.contains('taken')) return;

            document.getElementById('status').textContent = 'AI thinking...';

            const res = await fetch('/api/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ row, col })
            });
            if (!res.ok) return;
            const data = await res.json();

            if (data.winning_line) winningLine = data.winning_line;

            if (data.winner || data.draw) {
                gameOver = true;
                const resultEl = document.getElementById('result');
                if (data.draw) {
                    resultEl.textContent = "It's a draw!";
                    resultEl.className = 'game-result draw';
                } else if (data.winner === config.human) {
                    resultEl.textContent = 'You win!';
                    resultEl.className = 'game-result win';
                    score++;
                    document.getElementById('scoreCount').textContent = score;
                } else {
                    resultEl.textContent = 'AI wins!';
                    resultEl.className = 'game-result lose';
                }
                document.getElementById('status').textContent = 'Game over';
            } else {
                document.getElementById('status').textContent = 'Your turn';
            }

            if (data.stats) {
                document.getElementById('stats').textContent =
                    `AI: ${data.stats.nodes} nodes, ${data.stats.time}s`;
            }

            renderBoard({ grid: data.grid, size: config.size });
        }
    </script>
</body>
</html>
